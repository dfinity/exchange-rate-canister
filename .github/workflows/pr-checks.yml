name: PR Checks

on:
  pull_request:
    types:
      - opened
      - reopened
      - edited
      - synchronize

jobs:
  conventional-pr-title:
    runs-on: ubuntu-22.04
    permissions:
      statuses: write
    steps:
      - uses: aslafy-z/conventional-pr-title-action@2ce59b07f86bd51b521dd088f0acfb0d7fdac55e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}